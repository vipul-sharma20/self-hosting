services:
  radarr:
    image: 'linuxserver/radarr:latest'
    ports:
      - '7878:7878'
    environment:
      - SERVICE_URL_RADARR_7878
      - _APP_URL=$SERVICE_URL_RADARR
      - PUID=1000
      - PGID=1000
      - 'TZ=${TZ:-Asia/Kolkata}'
    volumes:
      - 'radarr-data/radarr-config:/config'
      - 'radarr/movies:/movies'
      - 'radarr/downloads:/downloads'
    healthcheck:
      test:
        - CMD
        - curl
        - '-f'
        - 'http://localhost:7878/ping'
      interval: 2s
      timeout: 10s
      retries: 15
  warp-socks:
    image: 'monius/docker-warp-socks:latest'
    container_name: warp-socks
    restart: unless-stopped
    privileged: true
    cap_add:
      - NET_ADMIN
    devices:
      - '/dev/net/tun:/dev/net/tun'
    ports:
      - '1080:9091'
    volumes:
      - 'warp-data:/var/lib/cloudflare-warp'
    sysctls:
      - net.ipv6.conf.all.disable_ipv6=1
  qbittorrent:
    image: 'linuxserver/qbittorrent:latest'
    container_name: qbittorrent
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Asia/Kolkata
      - WEBUI_PORT=8080
      - WEBUI_HOST_HEADER_VALIDATION=false
    volumes:
      - 'qbittorrent-data/config:/config'
      - 'qbittorrent-data/custom-scripts:/custom-cont-init.d:ro'
      - 'radarr/downloads:/downloads/radarr'
      - 'sonarr/downloads:/downloads/sonarr'
    ports:
      - '8082:8080'
    restart: unless-stopped
  prowlarr:
    image: 'linuxserver/prowlarr:latest'
    container_name: prowlarr
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Asia/Kolkata
    volumes:
      - 'prowlarr-data/config:/config'
    ports:
      - '9696:9696'
    restart: unless-stopped
  flaresolverr:
    image: 'flaresolverr/flaresolverr:latest'
    container_name: flaresolverr
    environment:
      - TZ=Asia/Kolkata
    ports:
      - '8191:8191'
    restart: unless-stopped
  sonarr:
    image: 'linuxserver/sonarr:latest'
    ports:
      - '8989:8989'
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Asia/Kolkata
    volumes:
      - 'sonarr-data/config:/config'
      - 'sonarr/series:/tv'
      - 'sonarr/downloads:/downloads'
    healthcheck:
      test:
        - CMD
        - curl
        - '-f'
        - 'http://localhost:8989/ping'
      interval: 2s
      timeout: 10s
      retries: 15
    restart: unless-stopped
  bazarr:
    image: 'linuxserver/bazarr:latest'
    ports:
      - '6767:6767'
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Asia/Kolkata
    volumes:
      - 'bazarr-data/config:/config'
      - 'radarr/movies:/movies'
      - 'sonarr/series:/tv'
    restart: unless-stopped
volumes:
  radarr-config: null

